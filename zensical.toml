# ===== 主题配置 [UI] =====
[project.theme]
variant = "modern"                # Zensical 特有：使用 modern 主题变体
# name = "material"                 # 使用 Material for MkDocs 主题
custom_dir = "docs/overrides"          # 自定义主题目录（相对于配置文件）
logo = "https://pic2.zhimg.com/100/v2-864dbf5fe2906aae3f5f18b491320a0d_r.jpg"
# "https://s1.imagehub.cc/images/2025/12/06/28380affd86b014a6dcaf082fcc97064.png"
# "https://pica.zhimg.com/80/v2-74ecd899c7c4cc0258930eaff239a21b_1440w.webp"  # 网站 Logo
favicon = "https://i.stardots.io/wcowin/1750090373988.png"                         # 网站图标
language = "zh"                   # 网站语言：中文
font.code = "JetBrains Mono"  

# 主题功能特性
features = [
    "announce.dismiss",           # 可关闭公告栏
    "navigation.prune",           # 只渲染可见导航项
    "navigation.tracking",        # 滚动时URL锚点自动更新
    "navigation.tabs",            # 一级导航显示为顶部Tab
    "navigation.sections",        # 侧边栏分组
    "navigation.top",             # 返回顶部按钮
    "navigation.footer",          # 上一页/下一页导航
    # "navigation.instant",      # 即时导航
    "navigation.instant.progress",
    "navigation.instant.prefetch",  # 预加载
    "navigation.path",            # URL路径导航
    # "navigation.tabs.sticky",   # 顶部导航栏始终可见
    "search.suggest",             # 搜索建议
    "search.highlight",           # 搜索结果高亮
    "search.share",               # 搜索结果分享
    "toc.follow",                 # 目录跟随滚动
    "navigation.expand",          # 默认展开导航
    "navigation.indexes",         # 章节索引页
    "content.tabs.link",          # 内容标签页链接
    "content.tooltips",           # 内容提示框
    "content.code.copy",          # 代码复制按钮
    "content.code.select",        # 代码选择功能
    "content.code.annotate"       # 代码注释功能
]


# ===== 调色板配置 =====
# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "切换到浅色模式"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "blue"
toggle.icon = "lucide/sun"
toggle.name = "切换到夜间模式"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "blue"
toggle.icon = "lucide/moon"
toggle.name = "切换到日间模式"

