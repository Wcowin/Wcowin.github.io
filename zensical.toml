# ==========================================
# Zensical 配置文件
# pip install --upgrade --force-reinstall zensical
# ==========================================

[project]
# ===== 基本信息 [Info] =====
site_name = "Wcowin's Blog"                      # 网站名称
site_url = "https://wcowin.work/"                # 网站URL
site_description = "知足且上进，温柔且坚定"         # 网站描述
site_author = "Wcowin"                    # 网站作者
copyright = "Copyright &copy; 2022~2026 Wcowin" # 左下角的版权声明
docs_dir = "docs"                                # 文档目录
site_dir = "site"                                # 生成的网站目录
use_directory_urls = true                        # 使用目录形式的URL (例如: /page/ 而不是 /page.html)

# ===== 仓库配置 =====
repo_url = "https://github.com/Wcowin/Wcowin.github.io"  # 右上角点击跳转的链接
repo_name = "Wcowin.github.io"                           # 右上角的名字
edit_uri = "edit/main/docs"                              # 编辑按钮跳转的链接

# ===== 额外的 JavaScript 文件 =====
# 按加载顺序排列
